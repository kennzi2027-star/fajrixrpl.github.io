<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Special Day</title>
    <style>
        /* === BAGIAN CSS (TAMPILAN) === */
        body {
            margin: 0;
            padding: 0;
            background-color: #d6cfc3; /* Warna latar belakang coklat muda */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Container utama buku */
        .book-container {
            position: relative;
            width: 300px;
            height: 450px;
            perspective: 1000px; /* Memberikan efek 3D */
            margin-bottom: 20px;
        }

        /* Halaman buku */
        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #fff;
            border-radius: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transform-origin: left center; /* Titik putar lipatan di kiri */
            transition: transform 0.8s ease; /* Kecepatan animasi membalik */
            transform-style: preserve-3d;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 15px;
            box-sizing: border-box;
            background-size: cover;
            background-position: center;
        }

        /* Class untuk efek halaman terbalik */
        .flipped {
            transform: rotateY(-180deg);
        }

        /* Mengatur urutan tumpukan halaman (z-index) */
        #page3 { z-index: 1; }
        #page2 { z-index: 2; }
        #page1 { z-index: 3; } /* Cover depan paling atas */

        /* Konten di dalam halaman */
        .page-content {
            backface-visibility: hidden; /* Sembunyikan konten saat halaman terbalik */
            width: 100%;
            height: 100%;
        }

        /* Tombol navigasi */
        .btn {
            background-color: #7b5b5c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: background 0.3s;
            margin: 5px;
        }
        .btn:hover { background-color: #5c4344; }
        
        .nav-buttons {
            display: none; /* Disembunyikan awalnya */
        }
        .nav-buttons button {
            border-radius: 50%;
            width: 40px;
            height: 40px;
            padding: 0;
            font-size: 20px;
        }

        /* Gambar polaroid dummy */
        .polaroid {
            background: white;
            padding: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            margin: 10px 0;
            width: 80%;
        }
        .polaroid img {
            width: 100%;
            display: block;
        }

        /* === MODAL PESAN (POP-UP) === */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #f7f3e8;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            width: 80%;
            max-width: 300px;
        }
        textarea {
            width: 100%;
            height: 100px;
            border-radius: 10px;
            border: 1px solid #ccc;
            padding: 10px;
            box-sizing: border-box;
            margin-top: 10px;
            font-family: inherit;
        }
    </style>
</head>
<body>

    <div class="book-container">
        
        <div class="page" id="page3" style="background-color: #333; color: white;">
            <div class="page-content">
                <h2>Thank You</h2>
                <p>Special Memories</p>
            </div>
        </div>

        <div class="page" id="page2" style="background-color: #f4e8d1;">
            <div class="page-content">
                <div class="polaroid">
                    <img src="https://via.placeholder.com/150x150" alt="Foto Kita">
                </div>
                <h3>Happy Birthday!</h3>
                <p style="font-size: 14px;">Semoga keinginan baik kita disegerakan ya.</p>
            </div>
        </div>

        <div class="page" id="page1" style="background-color: #5c4c44; color: white;">
            <div class="page-content">
                <div class="polaroid">
                    <img src="https://via.placeholder.com/150x200" alt="Cover">
                </div>
                <h2 style="font-family: cursive;">Happy<br>Special Day</h2>
            </div>
        </div>

    </div>

    <button id="openBtn" class="btn">Open</button>

    <div id="navButtons" class="nav-buttons">
        <button id="prevBtn" class="btn">←</button>
        <button id="nextBtn" class="btn">→</button>
    </div>

    <button id="kirimPesanBtn" class="btn" style="display: none;">Kirim Pesan</button>

    <div id="messageModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Tulis pesan</h3>
            <div id="modalBody">
                <textarea id="pesanInput" placeholder="Tulis sesuatu..."></textarea>
                <br><br>
                <button id="submitPesan" class="btn">Kirim</button>
            </div>
        </div>
    </div>

    <script>
        /* === BAGIAN JAVASCRIPT (LOGIKA) === */
        
        let currentPage = 1;
        const totalPages = 3;

        // Mengambil elemen-elemen dari HTML
        const openBtn = document.getElementById('openBtn');
        const navButtons = document.getElementById('navButtons');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const kirimPesanBtn = document.getElementById('kirimPesanBtn');
        
        const modal = document.getElementById('messageModal');
        const submitPesan = document.getElementById('submitPesan');
        const pesanInput = document.getElementById('pesanInput');
        const modalTitle = document.getElementById('modalTitle');
        const modalBody = document.getElementById('modalBody');

        // Fungsi saat tombol "Open" ditekan
        openBtn.addEventListener('click', () => {
            document.getElementById('page1').classList.add('flipped');
            openBtn.style.display = 'none'; // Sembunyikan tombol open
            navButtons.style.display = 'block'; // Tampilkan tombol panah
            currentPage = 2;
        });

        // Fungsi tombol "Next" (Panah Kanan)
        nextBtn.addEventListener('click', () => {
            if (currentPage < totalPages) {
                document.getElementById('page' + currentPage).classList.add('flipped');
                currentPage++;
            }
            
            // Jika sudah di halaman terakhir, munculkan tombol Kirim Pesan
            if(currentPage === totalPages) {
                navButtons.style.display = 'none';
                kirimPesanBtn.style.display = 'block';
            }
        });

        // Fungsi tombol "Prev" (Panah Kiri)
        prevBtn.addEventListener('click', () => {
            if (currentPage > 2) {
                currentPage--;
                document.getElementById('page' + currentPage).classList.remove('flipped');
            } else if (currentPage === 2) {
                // Kembali ke cover
                currentPage = 1;
                document.getElementById('page1').classList.remove('flipped');
                navButtons.style.display = 'none';
                openBtn.style.display = 'block';
            }
        });

        // Fungsi buka modal pesan
        kirimPesanBtn.addEventListener('click', () => {
            modal.style.display = 'flex';
        });

        // Fungsi saat tombol "Kirim" di dalam modal ditekan
        submitPesan.addEventListener('click', () => {
            if (pesanInput.value.trim() === '') {
                // Peringatan jika kosong seperti di video
                alert('Jangan dikosongin ya :)');
            } else {
                // Proses mengirim pesan (Simulasi Loading)
                modalTitle.innerText = "Mengirim pesan...";
                modalBody.innerHTML = "<h3>⏳</h3>"; // Icon loading sederhana
                
                // Menunggu 2 detik lalu sukses
                setTimeout(() => {
                    modalTitle.innerText = "Pesan berhasil dikirim!";
                    modalBody.innerHTML = "<button class='btn' onclick='location.reload()'>OK</button>";
                }, 2000);
            }
        });
    </script>
</body>
</html>
